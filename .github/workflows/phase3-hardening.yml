name: Phase 3 hardening

on:
  push:
    branches:
      - fix/phase3-registry-hardening
    paths:
      - tools/apply_phase3_hardening.py
      - .github/workflows/phase3-hardening.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/phase3-registry-hardening
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project
        run: python -m pip install -e . pytest

      - name: Apply Phase 3 hardening
        run: python tools/apply_phase3_hardening.py

      - name: Run Phase 3 tests
        run: python -m pytest -q tests/test_discovery.py

      - name: Run full test suite
        run: python -m pytest -q

      - name: Compile package
        run: python -m compileall -q career_pipeline

      - name: Check patch whitespace
        run: git diff --check

      - name: Commit verified changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No code changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career_pipeline/discovery.py career_pipeline/registry.py
          git commit -m "fix: harden Phase 3 discovery and registry"
          git push origin HEAD:fix/phase3-registry-hardening
