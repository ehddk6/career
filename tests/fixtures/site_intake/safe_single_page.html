<!doctype html><html><body>
<form id="application" action="https://company.applyin.co.kr/apply/submit" method="post">
<label for="applicant_name">Applicant</label><input id="applicant_name" name="applicant_name" type="text" required maxlength="40">
<label for="email">Email</label><input id="email" name="email" type="email" required maxlength="120">
<label for="phone">Phone</label><input id="phone" name="phone" type="tel" required maxlength="20">
<label for="track">Track</label><select id="track" name="track" required><option value="admin">Administration</option><option value="finance">Finance</option></select>
<label for="answer">Answer</label><textarea id="answer" name="answer" required maxlength="1000"></textarea>
<label for="consent">Consent</label><input id="consent" name="consent" type="checkbox" required>
<button id="save" type="button" data-role="save">Save draft</button>
<button id="submit" type="submit">Submit</button>
</form></body></html>
