<!doctype html><html><head><meta charset="utf-8"><title>테스트금융공단 2026 일반행정 테스트 채용</title></head><body>
<form id="jrs-application" action="https://jrs.fixture.invalid/application/submit" method="post">
<label for="applicant_name">성명</label><input id="applicant_name" name="applicant_name" type="text" required maxlength="40">
<label for="email">이메일</label><input id="email" name="email" type="email" required maxlength="120">
<label for="phone">전화번호</label><input id="phone" name="phone" type="tel" required maxlength="20">
<label for="recruitment_track">지원 분야</label><select id="recruitment_track" name="recruitment_track" required><option value="general_admin">일반행정</option><option value="finance">금융</option><option value="it">IT</option></select>
<label for="work_region">근무 지역</label><select id="work_region" name="work_region" required><option value="seoul">서울</option><option value="gangwon">강원</option><option value="nationwide">전국</option></select>
<label for="motivation">지원 동기</label><textarea id="motivation" name="motivation" required maxlength="1000"></textarea>
<label for="problem_solving">문제 해결</label><textarea id="problem_solving" name="problem_solving" required maxlength="1000"></textarea>
<label for="teamwork">협업 경험</label><textarea id="teamwork" name="teamwork" required maxlength="1000"></textarea>
<label for="career_plan">입사 후 계획</label><textarea id="career_plan" name="career_plan" required maxlength="1000"></textarea>
<label for="privacy_consent">개인정보 처리 동의</label><input id="privacy_consent" name="privacy_consent" type="checkbox" required>
<button id="save_draft" type="button">임시 저장</button><button id="final_submit" type="submit">최종 제출</button>
</form></body></html>
